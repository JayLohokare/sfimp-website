<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF Indian Music Project</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Minimal Header -->
    <header class="minimal-header">
        <div class="logo">SFIMP</div>
    </header>

    <!-- Hero - Instagram Grid as Centerpiece -->
    <section class="hero-instagram">
        <div class="insta-grid-hero">
            <!-- Instagram post cards with links -->
            <a href="https://www.instagram.com/sfindianmusicproject/reel/DVxLOXdkXEx/" target="_blank" class="insta-card">
                <div class="insta-placeholder">
                    <span>🎬 Studio Sessions</span>
                </div>
            </a>
            <a href="https://www.instagram.com/sfindianmusicproject/reel/DVnT5-nDc4Y/" target="_blank" class="insta-card">
                <div class="insta-placeholder">
                    <span>🎸 Live Music</span>
                </div>
            </a>
            <a href="https://www.instagram.com/sfindianmusicproject/reel/DVWp-I1knB3/" target="_blank" class="insta-card">
                <div class="insta-placeholder">
                    <span>✨ Classical Fusion</span>
                </div>
            </a>
            <a href="https://www.instagram.com/sfindianmusicproject/reel/DVL-KDTAHgO/" target="_blank" class="insta-card">
                <div class="insta-placeholder">
                    <span>🎪 Spark Social</span>
                </div>
            </a>
            <a href="https://www.instagram.com/sfindianmusicproject/reel/DU7W66yEVlB/" target="_blank" class="insta-card">
                <div class="insta-placeholder">
                    <span>🎤 Bollywood Jam</span>
                </div>
            </a>
            <a href="https://www.instagram.com/sfindianmusicproject/reel/DUuPQ-jEUnN/" target="_blank" class="insta-card">
                <div class="insta-placeholder">
                    <span>🎵 Acoustic Vibes</span>
                </div>
            </a>
        </div>
    </section>

    <!-- Simple Community Message -->
    <section class="community-message">
        <h1>Music. Community. Vibes.</h1>
        <p>San Francisco Bay Area</p>
    </section>

    <!-- Instagram Follow CTA -->
    <section class="insta-cta">
        <a href="https://instagram.com/sfindianmusicproject" class="insta-link">@sfindianmusicproject</a>
        <p class="follower-count">1,023 followers • 40 posts</p>
    </section>

    <!-- Footer - Minimal -->
    <footer>
        <p>San Francisco Indian Music Project</p>
    </footer>

    <script async src="//www.instagram.com/embed.js"></script>
    <script src="script.js"></script>
</body>
</html>
